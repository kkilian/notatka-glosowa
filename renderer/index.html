<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notatka Głosowa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Draggable title bar area (for hiddenInset titlebar) -->
  <div class="titlebar">
    <span class="titlebar-text">Notatka Głosowa</span>
    <button class="pin-btn" id="pinBtn" title="Zawsze na wierzchu (wył.)">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path class="pin-path" d="M10.97 2.29a1 1 0 0 1 1.41 0l1.33 1.33a1 1 0 0 1 0 1.41L12 6.75l.59.58a1 1 0 0 1 0 1.42L10.7 10.6a1 1 0 0 1-1.41 0L8 9.32 5.35 12l-.7-.7L7.29 8.6l-1.3-1.3a1 1 0 0 1 0-1.4l1.86-1.87a1 1 0 0 1 1.41 0l.58.59 1.13-1.33Z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <!-- API Key setup screen -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-content">
      <div class="setup-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#86868b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="setup-title">Klucz API OpenAI</div>
      <div class="setup-hint">Wklej swój klucz API, aby korzystać z transkrypcji. Klucz zostanie zaszyfrowany i zapisany lokalnie.</div>
      <input type="password" class="setup-input" id="apiKeyInput" placeholder="sk-..." autocomplete="off" spellcheck="false">
      <div class="setup-error" id="setupError"></div>
      <button class="setup-btn" id="saveKeyBtn">Zapisz klucz</button>
    </div>
  </div>

  <!-- Main app -->
  <div class="container" id="mainApp" style="display: none;">
    <!-- Language toggle -->
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="pl">PL</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <!-- Status -->
    <div class="status" id="status">Gotowy</div>

    <!-- Timer -->
    <div class="timer" id="timer">00:00</div>

    <!-- Record button with radial visualizer -->
    <div class="record-area">
      <canvas id="waveform" width="300" height="300"></canvas>
      <button class="record-btn" id="recordBtn">
        <span class="record-icon" id="recordIcon"></span>
      </button>
    </div>
    <div class="record-label" id="recordLabel">Nagrywaj</div>

    <!-- Transcription loader -->
    <div class="transcription-loader" id="transcriptionLoader">
      <svg class="loader-svg" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4.43431 2.42415C-0.789139 6.90104 1.21472 15.2022 8.434 15.9242C15.5762 16.6384 18.8649 9.23035 15.9332 4.5183C14.1316 1.62255 8.43695 0.0528911 7.51841 3.33733C6.48107 7.04659 15.2699 15.0195 17.4343 16.9241" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="loader-text">Transkrypcja</span>
      <svg class="loader-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Result area -->
    <div class="result" id="result">
      <div class="result-header">
        <span class="result-stats" id="stats"></span>
        <button class="copy-btn" id="copyBtn">Kopiuj wszystko</button>
      </div>
      <div class="result-text" id="transcription"></div>
    </div>
  </div>

  <!-- Drop zone overlay -->
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-overlay-content">
      <div class="drop-icon">&#127925;</div>
      <div class="drop-text">Upusc plik audio</div>
      <div class="drop-hint">mp3, m4a, wav, webm, mp4</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
